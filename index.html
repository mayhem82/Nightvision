<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Night Vision Cam</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
  }
  video { display: none; }
  canvas {
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #000;
  }
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 14px 16px;
    color: #3f3;
    font-size: 13px;
    text-shadow: 0 0 4px #0f0;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
    letter-spacing: 1px;
  }
  #controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 18px 16px calc(18px + env(safe-area-inset-bottom));
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
  }
  button {
    background: rgba(10, 40, 10, 0.85);
    border: 1px solid #3f3;
    color: #3f3;
    padding: 10px 16px;
    font-family: inherit;
    font-size: 13px;
    border-radius: 6px;
    letter-spacing: 0.5px;
  }
  button.active {
    background: #3f3;
    color: #000;
  }
  button:disabled {
    opacity: 0.35;
  }
  #status {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #3f3;
    font-size: 13px;
    text-align: center;
    max-width: 80%;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div id="stage">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas"></canvas>
  <div id="status">Requesting camera…</div>
  <div id="hud">
    <span id="mode">MODE: OFF</span>
    <span id="gain">GAIN: 1.0x</span>
  </div>
  <div id="controls">
    <button id="nvToggle">Night Vision: OFF</button>
    <button id="torchToggle" disabled>Torch: N/A</button>
    <button id="gainDown">Gain -</button>
    <button id="gainUp">Gain +</button>
    <button id="capture">Capture</button>
  </div>
  <div id="camPicker" style="position:absolute; top:44px; right:16px; display:flex; flex-direction:column; gap:6px;"></div>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const statusEl = document.getElementById('status');
const nvToggle = document.getElementById('nvToggle');
const torchToggle = document.getElementById('torchToggle');
const gainUpBtn = document.getElementById('gainUp');
const gainDownBtn = document.getElementById('gainDown');
const captureBtn = document.getElementById('capture');
const gainLabel = document.getElementById('gain');
const modeLabel = document.getElementById('mode');

let stream = null;
let track = null;
let torchOn = false;
let torchSupported = false;
let nvOn = false;
let gain = 3.0; // brightness multiplier
let currentDeviceId = null;
const GAIN_STEP = 0.5, GAIN_MIN = 1.0, GAIN_MAX = 8.0;
const camPicker = document.getElementById('camPicker');

async function listBackCameras() {
  const devices = await navigator.mediaDevices.enumerateDevices();
  return devices.filter(d => d.kind === 'videoinput');
}

function labelForCamera(label, index) {
  const l = label.toLowerCase();
  if (l.includes('ultra') || l.includes('wide angle')) return 'Ultra-wide';
  if (l.includes('tele')) return 'Telephoto';
  if (l.includes('back') || l.includes('rear') || l.includes('environment')) return 'Main (wide)';
  return 'Lens ' + (index + 1);
}

async function buildCameraPicker() {
  const cams = await listBackCameras();
  camPicker.innerHTML = '';
  cams.forEach((cam, i) => {
    const btn = document.createElement('button');
    btn.textContent = labelForCamera(cam.label, i);
    btn.style.fontSize = '11px';
    btn.style.padding = '8px 10px';
    if (cam.deviceId === currentDeviceId) btn.classList.add('active');
    btn.addEventListener('click', () => switchCamera(cam.deviceId));
    camPicker.appendChild(btn);
  });
}

async function switchCamera(deviceId) {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
  }
  currentDeviceId = deviceId;
  stream = await navigator.mediaDevices.getUserMedia({
    video: {
      deviceId: { exact: deviceId },
      width: { ideal: 1280 },
      height: { ideal: 720 }
    },
    audio: false
  });
  video.srcObject = stream;
  await video.play();
  track = stream.getVideoTracks()[0];
  setupTorchForTrack();
  resizeCanvas();
  buildCameraPicker();
}

function setupTorchForTrack() {
  const caps = track.getCapabilities ? track.getCapabilities() : {};
  torchOn = false;
  torchToggle.classList.remove('active');
  if (caps.torch) {
    torchSupported = true;
    torchToggle.disabled = false;
    torchToggle.textContent = 'Torch: OFF';
  } else {
    torchSupported = false;
    torchToggle.disabled = true;
    torchToggle.textContent = 'Torch: unsupported';
  }
}

async function setTorch(on) {
  if (!track || !torchSupported) return;
  try {
    await track.applyConstraints({ advanced: [{ torch: on }] });
    torchOn = on;
    torchToggle.textContent = 'Torch: ' + (torchOn ? 'ON' : 'OFF');
    torchToggle.classList.toggle('active', torchOn);
  } catch (err) {
    torchToggle.textContent = 'Torch: failed';
    torchOn = false;
  }
}

async function initCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    track = stream.getVideoTracks()[0];
    const settings = track.getSettings ? track.getSettings() : {};
    currentDeviceId = settings.deviceId || null;

    setupTorchForTrack();
    statusEl.style.display = 'none';
    resizeCanvas();
    requestAnimationFrame(renderLoop);
    await buildCameraPicker();
  } catch (err) {
    statusEl.textContent = 'Camera access failed: ' + err.message +
      '\nCheck site permissions (camera) in browser settings.';
  }
}

function resizeCanvas() {
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;
}
video.addEventListener('loadedmetadata', resizeCanvas);

function renderLoop() {
  if (video.readyState >= 2) {
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    if (nvOn) {
      applyNightVision();
    }
  }
  requestAnimationFrame(renderLoop);
}

function applyNightVision() {
  const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const d = frame.data;
  for (let i = 0; i < d.length; i += 4) {
    // grayscale via luminance
    const lum = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
    // boost + gamma lift for low-light detail
    let boosted = Math.pow(lum / 255, 0.6) * 255 * (gain / 3.0);
    boosted = Math.min(255, boosted);
    // green-channel night vision tint
    d[i] = boosted * 0.15;
    d[i + 1] = boosted;
    d[i + 2] = boosted * 0.15;
  }
  ctx.putImageData(frame, 0, 0);
}

nvToggle.addEventListener('click', () => {
  nvOn = !nvOn;
  nvToggle.textContent = 'Night Vision: ' + (nvOn ? 'ON' : 'OFF');
  nvToggle.classList.toggle('active', nvOn);
  modeLabel.textContent = 'MODE: ' + (nvOn ? 'NIGHT VISION' : 'OFF');
});

torchToggle.addEventListener('click', () => {
  setTorch(!torchOn);
});

gainUpBtn.addEventListener('click', () => {
  gain = Math.min(GAIN_MAX, gain + GAIN_STEP);
  gainLabel.textContent = 'GAIN: ' + gain.toFixed(1) + 'x';
});
gainDownBtn.addEventListener('click', () => {
  gain = Math.max(GAIN_MIN, gain - GAIN_STEP);
  gainLabel.textContent = 'GAIN: ' + gain.toFixed(1) + 'x';
});

captureBtn.addEventListener('click', () => {
  canvas.toBlob((blob) => {
    if (!blob) return;
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.download = 'nightvision-' + Date.now() + '.png';
    link.href = url;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }, 'image/png');
});

initCamera();
</script>
</body>
</html>
