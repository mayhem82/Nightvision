<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Night Vision Cam</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
  }
  video { display: none; }
  canvas {
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #000;
  }
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 14px 16px;
    color: #3f3;
    font-size: 13px;
    text-shadow: 0 0 4px #0f0;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
    letter-spacing: 1px;
  }
  #controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 18px 16px calc(18px + env(safe-area-inset-bottom));
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
  }
  button {
    background: rgba(10, 40, 10, 0.85);
    border: 1px solid #3f3;
    color: #3f3;
    padding: 10px 16px;
    font-family: inherit;
    font-size: 13px;
    border-radius: 6px;
    letter-spacing: 0.5px;
  }
  button.active {
    background: #3f3;
    color: #000;
  }
  button:disabled {
    opacity: 0.35;
  }
  #status {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #3f3;
    font-size: 13px;
    text-align: center;
    max-width: 80%;
    line-height: 1.5;
  }
  #exposurePanel {
    position: absolute;
    top: 44px;
    left: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-width: 160px;
  }
  #exposurePanel label {
    color: #3f3;
    font-size: 10px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    background: rgba(10, 40, 10, 0.7);
    padding: 6px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }
  #exposurePanel input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    background: #1c2a1f;
    border-radius: 2px;
    outline: none;
  }
  #exposurePanel input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #3f3;
    box-shadow: 0 0 4px #3f3;
    cursor: pointer;
  }
  #exposurePanel input[type="range"]::-moz-range-thumb {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #3f3;
    box-shadow: 0 0 4px #3f3;
    cursor: pointer;
    border: none;
  }
  #exposurePanel .unsupported {
    color: #4d7a58;
    font-size: 10px;
    max-width: 150px;
    line-height: 1.4;
  }
  .sliderRow {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    color: #3f3;
    font-size: 12px;
    letter-spacing: 0.5px;
  }
  .sliderRow input[type="range"] {
    -webkit-appearance: none;
    flex: 1 1 auto;
    min-width: 90px;
    max-width: 240px;
    height: 4px;
    background: #1c2a1f;
    border-radius: 2px;
    outline: none;
  }
  .sliderRow input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #3f3;
    box-shadow: 0 0 5px #3f3;
    cursor: pointer;
  }
  .sliderRow input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #3f3;
    box-shadow: 0 0 5px #3f3;
    cursor: pointer;
    border: none;
  }
  .sliderRow span {
    min-width: 90px;
    text-align: center;
  }
</style>
</head>
<body>
<div id="stage">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas"></canvas>
  <div id="status">Requesting camera…</div>
  <div id="hud">
    <span id="mode">MODE: OFF</span>
    <span id="gain">GAIN: 3.0x</span>
    <span id="contrastLabel">CONTRAST: 1.0x</span>
  </div>
  <div id="controls">
    <button id="nvToggle">Night Vision: OFF</button>
    <button id="torchToggle" disabled>Torch: N/A</button>
    <div class="sliderRow">
      <span>Gain</span>
      <input type="range" id="gainSlider" min="1" max="250" step="10" value="3">
      <span id="gainSliderVal">3.0x</span>
    </div>
    <div class="sliderRow">
      <span>Contrast</span>
      <input type="range" id="contrastSlider" min="0.5" max="50" step="0.5" value="1">
      <span id="contrastSliderVal">1.0x</span>
    </div>
    <button id="capture">Capture</button>
  </div>
  <div id="camPicker" style="position:absolute; top:44px; right:16px; display:flex; flex-direction:column; gap:6px;"></div>
  <div id="exposurePanel"></div>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const statusEl = document.getElementById('status');
const nvToggle = document.getElementById('nvToggle');
const torchToggle = document.getElementById('torchToggle');
const gainSlider = document.getElementById('gainSlider');
const gainSliderVal = document.getElementById('gainSliderVal');
const contrastSlider = document.getElementById('contrastSlider');
const contrastSliderVal = document.getElementById('contrastSliderVal');
const captureBtn = document.getElementById('capture');
const gainLabel = document.getElementById('gain');
const contrastLabel = document.getElementById('contrastLabel');
const modeLabel = document.getElementById('mode');

let stream = null;
let track = null;
let torchOn = false;
let torchSupported = false;
let nvOn = false;
let gain = 3.0; // brightness multiplier
let contrast = 1.0; // post-boost contrast multiplier around midpoint
let currentDeviceId = null;
let currentExposureMode = 'continuous';
let exposureModeBtn = null;
const GAIN_STEP = 10.0, GAIN_MIN = 1.0, GAIN_MAX = 250.0;
const CONTRAST_STEP = 2.0, CONTRAST_MIN = 0.5, CONTRAST_MAX = 50.0;
const camPicker = document.getElementById('camPicker');
const exposurePanel = document.getElementById('exposurePanel');

async function listBackCameras() {
  const devices = await navigator.mediaDevices.enumerateDevices();
  return devices.filter(d => d.kind === 'videoinput');
}

function labelForCamera(label, index) {
  const l = label.toLowerCase();
  if (l.includes('ultra') || l.includes('wide angle')) return 'Ultra-wide';
  if (l.includes('tele')) return 'Telephoto';
  if (l.includes('back') || l.includes('rear') || l.includes('environment')) return 'Main (wide)';
  return 'Lens ' + (index + 1);
}

async function buildCameraPicker() {
  const cams = await listBackCameras();
  camPicker.innerHTML = '';
  cams.forEach((cam, i) => {
    const btn = document.createElement('button');
    btn.textContent = labelForCamera(cam.label, i);
    btn.style.fontSize = '11px';
    btn.style.padding = '8px 10px';
    if (cam.deviceId === currentDeviceId) btn.classList.add('active');
    btn.addEventListener('click', () => switchCamera(cam.deviceId));
    camPicker.appendChild(btn);
  });
}

async function switchCamera(deviceId) {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
  }
  currentDeviceId = deviceId;
  stream = await navigator.mediaDevices.getUserMedia({
    video: {
      deviceId: { exact: deviceId },
      width: { ideal: 1280 },
      height: { ideal: 720 }
    },
    audio: false
  });
  video.srcObject = stream;
  await video.play();
  track = stream.getVideoTracks()[0];
  setupTorchForTrack();
  buildExposureControls();
  resizeCanvas();
  buildCameraPicker();
}

function setupTorchForTrack() {
  const caps = track.getCapabilities ? track.getCapabilities() : {};
  torchOn = false;
  torchToggle.classList.remove('active');
  if (caps.torch) {
    torchSupported = true;
    torchToggle.disabled = false;
    torchToggle.textContent = 'Torch: OFF';
  } else {
    torchSupported = false;
    torchToggle.disabled = true;
    torchToggle.textContent = 'Torch: unsupported';
  }
}

async function setTorch(on) {
  if (!track || !torchSupported) return;
  try {
    await track.applyConstraints({ advanced: [{ torch: on }] });
    torchOn = on;
    torchToggle.textContent = 'Torch: ' + (torchOn ? 'ON' : 'OFF');
    torchToggle.classList.toggle('active', torchOn);
  } catch (err) {
    torchToggle.textContent = 'Torch: failed';
    torchOn = false;
  }
}

async function setExposureMode(mode) {
  if (!track) return;
  try {
    await track.applyConstraints({ advanced: [{ exposureMode: mode }] });
    currentExposureMode = mode;
  } catch (err) {
    // device advertised the mode but rejected switching to it; leave as-is
  }
  if (exposureModeBtn) {
    exposureModeBtn.textContent = 'Exposure: ' + (currentExposureMode === 'manual' ? 'Manual' : 'Auto');
    exposureModeBtn.classList.toggle('active', currentExposureMode === 'manual');
  }
}

function makeExposureSlider(labelText, range, startVal, onChange) {
  const wrap = document.createElement('label');
  const valSpan = document.createElement('span');
  valSpan.textContent = labelText + ': ' + startVal;
  const input = document.createElement('input');
  input.type = 'range';
  input.min = range.min;
  input.max = range.max;
  input.step = range.step || 1;
  input.value = startVal;
  input.addEventListener('input', () => {
    const val = parseFloat(input.value);
    valSpan.textContent = labelText + ': ' + val;
    onChange(val);
  });
  wrap.appendChild(valSpan);
  wrap.appendChild(input);
  return wrap;
}

function buildExposureControls() {
  exposurePanel.innerHTML = '';
  exposureModeBtn = null;
  currentExposureMode = 'continuous';
  if (!track || !track.getCapabilities) {
    exposurePanel.innerHTML = '<div class="unsupported">Manual exposure not available on this browser</div>';
    return;
  }
  const caps = track.getCapabilities();
  const settings = track.getSettings ? track.getSettings() : {};
  const supportsManual = Array.isArray(caps.exposureMode) && caps.exposureMode.includes('manual');

  if (supportsManual) {
    const modeBtn = document.createElement('button');
    modeBtn.textContent = 'Exposure: Auto';
    modeBtn.style.fontSize = '11px';
    modeBtn.style.padding = '8px 10px';
    modeBtn.addEventListener('click', () => {
      setExposureMode(currentExposureMode === 'manual' ? 'continuous' : 'manual');
    });
    exposureModeBtn = modeBtn;
    exposurePanel.appendChild(modeBtn);
  }

  // Night vision only ever needs the "brighter" half of each range -
  // longer shutter, higher ISO, positive EV. Cut off the darkening half
  // so all the slider's precision goes toward the useful direction.
  if (caps.exposureTime) {
    const brightRange = { min: (caps.exposureTime.min + caps.exposureTime.max) / 2, max: caps.exposureTime.max, step: caps.exposureTime.step };
    const start = Math.max(settings.exposureTime ?? brightRange.min, brightRange.min);
    exposurePanel.appendChild(makeExposureSlider('Shutter', brightRange, start, async (val) => {
      if (currentExposureMode !== 'manual') await setExposureMode('manual');
      try { await track.applyConstraints({ advanced: [{ exposureTime: val }] }); } catch (err) {}
    }));
  }

  if (caps.iso) {
    const brightRange = { min: (caps.iso.min + caps.iso.max) / 2, max: caps.iso.max, step: caps.iso.step };
    const start = Math.max(settings.iso ?? brightRange.min, brightRange.min);
    exposurePanel.appendChild(makeExposureSlider('ISO', brightRange, start, async (val) => {
      if (currentExposureMode !== 'manual') await setExposureMode('manual');
      try { await track.applyConstraints({ advanced: [{ iso: val }] }); } catch (err) {}
    }));
  }

  if (caps.exposureCompensation) {
    const brightRange = { min: Math.max(0, caps.exposureCompensation.min), max: caps.exposureCompensation.max, step: caps.exposureCompensation.step };
    const start = Math.max(settings.exposureCompensation ?? 0, brightRange.min);
    exposurePanel.appendChild(makeExposureSlider('EV', brightRange, start, async (val) => {
      try { await track.applyConstraints({ advanced: [{ exposureCompensation: val }] }); } catch (err) {}
    }));
  }

  if (!exposurePanel.children.length) {
    exposurePanel.innerHTML = '<div class="unsupported">No manual exposure controls on this device</div>';
  }
}

async function initCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    track = stream.getVideoTracks()[0];
    const settings = track.getSettings ? track.getSettings() : {};
    currentDeviceId = settings.deviceId || null;

    setupTorchForTrack();
    buildExposureControls();
    statusEl.style.display = 'none';
    resizeCanvas();
    requestAnimationFrame(renderLoop);
    await buildCameraPicker();
  } catch (err) {
    statusEl.textContent = 'Camera access failed: ' + err.message +
      '\nCheck site permissions (camera) in browser settings.';
  }
}

function resizeCanvas() {
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;
}
video.addEventListener('loadedmetadata', resizeCanvas);

function renderLoop() {
  if (video.readyState >= 2) {
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    if (nvOn) {
      applyNightVision();
    }
  }
  requestAnimationFrame(renderLoop);
}

function applyNightVision() {
  const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const d = frame.data;
  for (let i = 0; i < d.length; i += 4) {
    // grayscale via luminance
    const lum = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
    // gamma lift, then brightness gain, then contrast stretch around midpoint
    let boosted = Math.pow(lum / 255, 0.5) * 255 * gain;
    boosted = (boosted - 128) * contrast + 128;
    boosted = Math.max(0, Math.min(255, boosted));
    d[i] = boosted;
    d[i + 1] = boosted;
    d[i + 2] = boosted;
  }
  ctx.putImageData(frame, 0, 0);
}

nvToggle.addEventListener('click', () => {
  nvOn = !nvOn;
  nvToggle.textContent = 'Night Vision: ' + (nvOn ? 'ON' : 'OFF');
  nvToggle.classList.toggle('active', nvOn);
  modeLabel.textContent = 'MODE: ' + (nvOn ? 'NIGHT VISION' : 'OFF');
});

torchToggle.addEventListener('click', () => {
  setTorch(!torchOn);
});

gainSlider.min = GAIN_MIN;
gainSlider.max = GAIN_MAX;
gainSlider.step = GAIN_STEP;
gainSlider.value = gain;
gainSlider.addEventListener('input', () => {
  gain = parseFloat(gainSlider.value);
  gainSliderVal.textContent = gain.toFixed(1) + 'x';
  gainLabel.textContent = 'GAIN: ' + gain.toFixed(1) + 'x';
});

contrastSlider.min = CONTRAST_MIN;
contrastSlider.max = CONTRAST_MAX;
contrastSlider.step = CONTRAST_STEP;
contrastSlider.value = contrast;
contrastSlider.addEventListener('input', () => {
  contrast = parseFloat(contrastSlider.value);
  contrastSliderVal.textContent = contrast.toFixed(1) + 'x';
  contrastLabel.textContent = 'CONTRAST: ' + contrast.toFixed(1) + 'x';
});

captureBtn.addEventListener('click', () => {
  canvas.toBlob((blob) => {
    if (!blob) return;
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.download = 'nightvision-' + Date.now() + '.png';
    link.href = url;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }, 'image/png');
});

initCamera();
</script>
</body>
</html>
